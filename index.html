<!DOCTYPE html>
<html lang="en" class="page-index">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lettiq — Find the words. Beat the clock.</title>
  <meta name="description" content="Lettiq is a mobile word-puzzle game. Find hidden words across a tile board, challenge friends over local Wi-Fi, and customise your experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <link rel="icon" href="assets/favicon.ico" />
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blob blob-indigo" aria-hidden="true"></div>
  <div class="blob blob-mint" aria-hidden="true"></div>

  <!-- NAV -->
  <header>
    <a href="index.html" class="nav-logo" aria-label="Lettiq home">
      <img src="./assets/appIconRectangle.png" alt="Lettiq" class="sq" />
    </a>
    <div class="nav-right">
      <div id="lang-switcher" role="group" aria-label="Language selector"></div>
      <a href="privacy.html" class="nav-link" data-i18n="navPrivacy">Privacy Policy</a>
    </div>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero" aria-label="Hero">
      <img class="hero-icon" src="./assets/appIconRounded.png" alt="Lettiq app icon" />
      <h1 class="wordmark">Lettiq</h1>
      <p class="tagline" data-i18n="tagline">Find the words. Beat the clock.</p>
      <!--
      <div class="cta-buttons">
        <a href="#" class="btn btn-primary" data-i18n="btnAppStore">App Store</a>
        <a href="#" class="btn btn-secondary" data-i18n="btnGooglePlay">Google Play</a>
      </div>
      -->
    </section>

    <!-- ABOUT -->
    <section class="about" aria-label="About">
      <p class="section-label" data-i18n="aboutLabel">About the Game</p>
      <h2 class="section-title" data-i18n="aboutTitle">Where Speed Meets Intelligence</h2>
      <div class="about-body">
        <p data-i18n="aboutBody1"></p>
        <p data-i18n="aboutBody2"></p>
        <p class="about-cta" data-i18n="aboutBody3"></p>
      </div>
    </section>

    <!-- FEATURES -->
    <section class="features" aria-label="Features">
      <p class="section-label" data-i18n="featuresLabel">Features</p>
      <h2 class="section-title" data-i18n="featuresTitle">Why Lettiq?</h2>
      <div class="features-grid" id="features-grid"></div>
    </section>

    <!-- MENTAL TRAINING -->
    <section class="mental-training" aria-label="Mental Training">
      <p class="section-label" data-i18n="mentalLabel">Brain Training</p>
      <h2 class="section-title" data-i18n="mentalTitle">A Mental Sprint in Every Round</h2>
      <p class="mental-intro" data-i18n="mentalIntro"></p>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <!-- DOWNLOAD CTA -->
    <section class="download-cta" aria-label="Download">
      <p class="section-label" data-i18n="downloadLabel">Download</p>
      <h2 class="section-title" data-i18n="downloadTitle">Start Playing Today</h2>
      <div class="cta-buttons">
        <!-- <a href="#" class="btn btn-primary" data-i18n="btnAppStore">App Store</a> -->
        <a href="#" class="btn btn-secondary" data-i18n="btnGooglePlay">Google Play</a>
      </div>
      <p class="platform-note" data-i18n="platformNote">Available on Android</p>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-note" data-i18n="footerCopyright">© 2026 Lettiq Studio</span>
    <a href="privacy.html" class="footer-note" data-i18n="footerPrivacy">Privacy Policy</a>
  </footer>

  <!-- i18n -->
  <script src="i18n/index.en.js"></script>
  <script src="i18n/index.pl.js"></script>
  <script src="i18n/engine.js"></script>
  <script>
    // ── Feature icon SVGs (language-independent) ──────────────────
    const FEATURE_ICONS = {
      'word-discovery': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="2"/>
        <rect x="14" y="3" width="7" height="7" rx="2"/>
        <rect x="3" y="14" width="7" height="7" rx="2"/>
        <rect x="14" y="14" width="7" height="7" rx="2"/>
      </svg>`,
      'brain-training': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19C8 21 4 19 3 16C1 13 2 9 4 7C5 4 6 2 8 3C9 3 10 4 9 5C9 5 11 3 12 5Z"/>
        <line x1="12" y1="8" x2="20" y2="8"/>
        <circle cx="20" cy="8" r="1.2" fill="#2FFFC2" stroke="none"/>
        <polyline points="12,13 17,13 17,10"/>
        <circle cx="17" cy="10" r="1.2" fill="#2FFFC2" stroke="none"/>
        <line x1="12" y1="17" x2="20" y2="17"/>
        <circle cx="20" cy="17" r="1.2" fill="#2FFFC2" stroke="none"/>
      </svg>`,
      'lan-multiplayer': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#2FFFC2"/>
      </svg>`,
      'themes': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>`,
    };

    // ── Skill icon SVGs (language-independent) ────────────────────
    const SKILL_ICONS = {
      'quick-thinking': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>`,
      'pattern-recognition': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
      </svg>`,
      'memory-recall': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
        <path d="M12 6v6l4 2"/>
      </svg>`,
      'vocabulary': `<svg viewBox="0 0 24 24" fill="none" stroke="#2FFFC2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <line x1="9" y1="7" x2="15" y2="7"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
      </svg>`,
    };

    // ── Page render function ──────────────────────────────────────
    function renderIndex(lang) {
      const t = window.TRANSLATIONS[lang];
      if (!t) return;

      document.documentElement.lang = t.meta.htmlLang;
      document.title = t.meta.pageTitle;

      I18n.applyDataI18n(t);

      // Render feature cards
      const grid = document.getElementById('features-grid');
      if (grid) {
        grid.innerHTML = t.features.map(f => `
          <div class="feature-card">
            <div class="feature-icon" aria-hidden="true">${FEATURE_ICONS[f.id] || ''}</div>
            <p class="feature-title">${f.title}</p>
            <p class="feature-desc">${f.desc}</p>
          </div>
        `).join('');
      }

      // Render mental skill items
      const skillsGrid = document.getElementById('skills-grid');
      if (skillsGrid && t.mentalSkills) {
        skillsGrid.innerHTML = t.mentalSkills.map(s => `
          <div class="skill-item">
            <div class="skill-icon" aria-hidden="true">${SKILL_ICONS[s.id] || ''}</div>
            <p class="skill-title">${s.title}</p>
            <p class="skill-desc">${s.desc}</p>
          </div>
        `).join('');
      }
    }

    I18n.initI18n(renderIndex);
  </script>

</body>
</html>
